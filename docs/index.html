<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignWriter Fácil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 28px;
      color: #2D78BB;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 15px;
      margin-bottom: 40px;
    }
    .emoji { font-size: 64px; margin-bottom: 20px; }
    .links { display: flex; flex-direction: column; gap: 14px; }
    a.btn {
      display: block;
      padding: 16px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: opacity 0.2s;
    }
    a.btn:hover { opacity: 0.85; }
    .btn-blue { background: #2D78BB; color: white; }
    .btn-green { background: #1D9E75; color: white; }
    .btn-outline {
      border: 2px solid #2D78BB;
      color: #2D78BB;
      background: white;
    }
    footer {
      margin-top: 32px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🤟</div>
    <h1>SignWriter Fácil</h1>
    <p class="subtitle">Inclusão, acessibilidade e tecnologia caminhando juntas</p>

    <div class="links">
      <a class="btn btn-blue" href="privacy-policy.html">
        🔒 Política de Privacidade
      </a>
      <a class="btn btn-green" href="terms-of-service.html">
        📋 Termos de Serviço
      </a>
      <a class="btn btn-outline" href="https://github.com/LhuanyMotta/SignWriter-Easy-App" target="_blank">
        💻 Ver no GitHub
      </a>
    </div>
  </div>

  <footer>
    © 2025 SignWriter Fácil — Desenvolvido no IFRO Câmpus Ji-Paraná
  </footer>
</body>
</html>
